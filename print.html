<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>طباعة الحجز | بيت التحفيات</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f3f3f3;
      padding:20px;
    }
    .paper{
      max-width:900px;
      margin:auto;
      background:#fff;
      padding:24px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }
    h2,h3{ margin-top:0 }
    table{
      width:100%;
      border-collapse:collapse;
      margin-bottom:16px;
    }
    td{
      border:1px solid #ddd;
      padding:8px;
    }
    td.label{
      background:#f5f5f5;
      width:35%;
      font-weight:bold;
    }
    .actions{
      display:flex;
      gap:12px;
      justify-content:center;
      margin-top:20px;
    }
    button{
      padding:10px 18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:14px;
    }
    .print{ background:#6b0f0f; color:#fff; }
    .pdf{ background:#333; color:#fff; }

    @media print{
      body{ background:#fff; padding:0 }
      .actions{ display:none }
      .paper{ box-shadow:none }
    }
  </style>
</head>

<body>

<div class="paper" id="printArea">
  <h2>📌 تفاصيل الحجز — بيت التحفيات</h2>

  <table>
    <tr><td class="label">رقم الحجز</td><td id="booking_id"></td></tr>
    <tr><td class="label">تاريخ الإرسال</td><td id="created_at"></td></tr>
    <tr><td class="label">نوع الفعالية</td><td id="event_type"></td></tr>
    <tr><td class="label">التاريخ</td><td id="booking_date"></td></tr>
    <tr><td class="label">وقت البداية</td><td id="start_time"></td></tr>
    <tr><td class="label">وقت النهاية</td><td id="end_time"></td></tr>
    <tr><td class="label">عدد الساعات</td><td id="duration_hours"></td></tr>
  </table>

  <h3>بيانات الزبون</h3>
  <table>
    <tr><td class="label">الاسم</td><td id="full_name"></td></tr>
    <tr><td class="label">الهاتف</td><td id="phone"></td></tr>
    <tr><td class="label">الإيميل</td><td id="customer_email"></td></tr>
    <tr><td class="label">تاريخ الولادة</td><td id="birthdate"></td></tr>
  </table>

  <h3>الأطفال</h3>
  <table>
    <tr><td class="label">هل يوجد أطفال؟</td><td id="has_kids"></td></tr>
    <tr><td class="label">عمر أصغر طفل</td><td id="youngest_kid_age"></td></tr>
  </table>

  <div class="actions">
    <button class="print" onclick="window.print()">🖨️ طباعة</button>
    <button class="pdf" onclick="downloadPDF()">⬇️ تحميل PDF</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="print.js"></script>
</body>
</html>
